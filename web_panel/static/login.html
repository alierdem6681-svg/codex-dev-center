<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="refresh" content="0; url=/">
    <title>Codex Dev Center Dashboard</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f6f8;
        --ink: #20242c;
        --muted: #68707d;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--ink);
        font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(420px, calc(100vw - 28px));
        text-align: center;
      }
      h1 { margin: 0 0 6px; font-size: 20px; letter-spacing: 0; }
      p { margin: 0; color: var(--muted); }
      a { color: #2f5f73; }
    </style>
    <script>
      location.replace('/');
    </script>
  </head>
  <body>
    <main>
      <h1>Dashboard açılıyor</h1>
      <p>Panel doğrudan açılır. Otomatik yönlenmezse <a href="/">dashboard</a> sayfasına gidin.</p>
    </main>
  </body>
</html>
