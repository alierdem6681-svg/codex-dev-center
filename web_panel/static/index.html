<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Codex Dev Center Yönetim Paneli</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f6f8;
        --panel: #ffffff;
        --ink: #20242c;
        --muted: #68707d;
        --line: #d9dde5;
        --soft: #eef1f5;
        --ok: #226b55;
        --warn: #8a5a10;
        --bad: #9a2f2f;
        --accent: #2f5f73;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; max-width: 100%; overflow-x: hidden; }
      body {
        background: var(--bg);
        color: var(--ink);
        font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      header {
        background: var(--panel);
        border-bottom: 1px solid var(--line);
        padding: 14px 18px;
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
      }
      h1 { margin: 0; font-size: 19px; letter-spacing: 0; }
      h2 { margin: 0 0 10px; font-size: 15px; letter-spacing: 0; }
      main { padding: 14px; max-width: 1500px; margin: 0 auto; }
      section, .item {
        min-width: 0;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px;
        overflow-wrap: anywhere;
      }
      .stack { display: grid; gap: 12px; }
      .wide { display: grid; gap: 12px; grid-template-columns: 1.15fr .85fr; }
      .metric { font-size: 22px; font-weight: 700; margin-top: 3px; }
      .muted { color: var(--muted); font-size: 12px; }
      .badge {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 3px 8px;
        background: var(--soft);
        color: var(--muted);
        font-size: 12px;
        margin: 2px 4px 2px 0;
        white-space: nowrap;
      }
      .ok { color: var(--ok); background: #e7f2ee; }
      .warn { color: var(--warn); background: #f7efd9; }
      .bad { color: var(--bad); background: #f5e4e4; }
      button, select, input {
        border: 1px solid var(--line);
        border-radius: 7px;
        padding: 8px 10px;
        background: #fff;
        color: var(--ink);
        font: inherit;
      }
      button { cursor: pointer; background: #eaf0f4; color: var(--accent); }
      button.primary { background: #dcebf0; border-color: #c8dce5; }
      .controls { display: grid; gap: 8px; grid-template-columns: 1.3fr repeat(4, minmax(120px, .6fr)); margin-bottom: 10px; }
      .actions { display: flex; gap: 8px; flex-wrap: wrap; }
      .header-actions { align-items: center; position: relative; }
      .account-menu { position: relative; }
      .account-trigger {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 38px;
        max-width: min(280px, 48vw);
        padding: 5px 9px 5px 6px;
      }
      .account-avatar {
        display: inline-grid;
        place-items: center;
        flex: 0 0 28px;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: #2f5f73;
        color: #fff;
        font-size: 12px;
        font-weight: 700;
      }
      .account-copy { min-width: 0; text-align: left; }
      .account-name {
        display: block;
        max-width: 190px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--ink);
        font-weight: 650;
      }
      .account-role { display: block; color: var(--muted); font-size: 11px; }
      .account-panel {
        position: absolute;
        z-index: 10;
        top: calc(100% + 8px);
        right: 0;
        width: min(280px, calc(100vw - 28px));
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 14px 30px rgba(32, 36, 44, .16);
        padding: 10px;
      }
      .account-panel[hidden] { display: none; }
      .account-summary {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 3px 2px 10px;
        border-bottom: 1px solid var(--line);
        margin-bottom: 8px;
        min-width: 0;
      }
      .account-summary strong {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .menu-item {
        width: 100%;
        display: flex;
        justify-content: flex-start;
        margin-top: 4px;
        background: #fff;
        color: var(--ink);
      }
      .menu-item:hover, .menu-item:focus { background: var(--soft); }
      .menu-item.danger { color: var(--bad); }
      table { width: 100%; border-collapse: collapse; }
      th, td { border-bottom: 1px solid var(--line); padding: 8px 6px; text-align: left; vertical-align: top; }
      th { color: var(--muted); font-weight: 600; font-size: 12px; }
      pre { margin: 0; white-space: pre-wrap; background: #f2f4f6; padding: 10px; border-radius: 7px; max-height: 280px; overflow: auto; }
      .mobile-list { display: none; }
      .section-title-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
      .section-title-row h2 { margin-bottom: 0; }
      .tabbar {
        display: flex;
        gap: 6px;
        overflow-x: auto;
        padding: 10px 0 6px;
        scrollbar-width: thin;
      }
      .tab-button {
        flex: 0 0 auto;
        min-height: 38px;
        min-width: 108px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        white-space: nowrap;
      }
      .tab-button[aria-selected="true"] {
        background: #dcebf0;
        border-color: #8eb7c7;
        color: #234b5d;
        font-weight: 700;
      }
      .tab-count {
        min-width: 24px;
        border-radius: 999px;
        padding: 1px 7px;
        background: rgba(32, 36, 44, .08);
        color: var(--ink);
        font-size: 12px;
        text-align: center;
      }
      .flow-summary {
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(4, minmax(130px, 1fr));
        margin: 2px 0 8px;
      }
      .flow-summary > div {
        min-width: 0;
        border-top: 1px solid var(--line);
        padding-top: 8px;
      }
      .flow-value { font-size: 17px; font-weight: 700; margin-top: 2px; }
      .flow-task {
        display: grid;
        grid-template-columns: minmax(180px, 1.2fr) minmax(140px, .8fr) minmax(120px, .6fr);
        gap: 8px;
        align-items: start;
        border-top: 1px solid var(--line);
        padding: 9px 0;
      }
      .flow-marker-row { display: flex; gap: 6px; flex-wrap: wrap; margin: 6px 0 8px; }
      @media (max-width: 980px) {
        .wide, .controls, .flow-summary, .flow-task { grid-template-columns: 1fr; }
        .desktop-table { display: none; }
        .mobile-list { display: grid; gap: 8px; }
        header { align-items: flex-start; flex-direction: column; }
        .header-actions { width: 100%; justify-content: space-between; }
        .account-trigger { max-width: calc(100vw - 160px); }
        .account-panel { left: auto; right: 0; }
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>Codex Dev Center Yönetim Paneli</h1>
        <div class="muted">Görevler, pipeline flow ve güvenli panel yönetimi</div>
      </div>
      <div class="actions header-actions">
        <span id="clock" class="badge">Yükleniyor</span>
        <div id="accountMenu" class="account-menu">
          <button id="accountMenuButton" class="account-trigger" type="button" aria-haspopup="true" aria-expanded="false" aria-controls="accountMenuPanel" onclick="toggleAccountMenu()">
            <span id="accountAvatar" class="account-avatar">P</span>
            <span class="account-copy">
              <span id="accountName" class="account-name">Panel</span>
              <span class="account-role">Hesap</span>
            </span>
          </button>
          <div id="accountMenuPanel" class="account-panel" role="menu" aria-labelledby="accountMenuButton" hidden>
            <div class="account-summary">
              <span id="accountPanelAvatar" class="account-avatar">P</span>
              <div class="account-copy">
                <strong id="accountPanelUsername">Panel kullanıcısı</strong>
                <span id="accountPanelMode" class="account-role">Oturum açık</span>
              </div>
            </div>
            <button class="menu-item" type="button" role="menuitem" onclick="scrollToAccountSettings()">Hesap ayarları</button>
            <button class="menu-item danger" type="button" role="menuitem" onclick="logout()">Çıkış</button>
          </div>
        </div>
      </div>
    </header>

    <main class="stack">
      <section>
        <div class="section-title-row">
          <h2>Pipeline Flow</h2>
          <div class="actions">
            <span id="pipelineFlowUpdated" class="badge">Yükleniyor</span>
            <span id="pipelineFlowMode" class="badge">Salt okunur</span>
          </div>
        </div>
        <div id="pipelineFlowTabs" class="tabbar" role="tablist" aria-label="Pipeline Flow stage sekmeleri"></div>
        <div id="pipelineFlowPanel" role="tabpanel" aria-live="polite"></div>
      </section>

      <div class="wide">
        <section>
          <h2>Görevler</h2>
          <div class="controls">
            <input id="search" placeholder="Ara">
            <select id="statusFilter"><option value="">Tüm durumlar</option></select>
            <select id="workerFilter"><option value="">Tüm çalışanlar</option></select>
            <select id="riskFilter"><option value="">Tüm riskler</option></select>
            <select id="sortMode">
              <option value="newest">En yeni</option>
              <option value="oldest">En eski</option>
              <option value="risk">En riskli</option>
              <option value="errors">En çok hata</option>
            </select>
          </div>
          <div id="tasksTable" class="desktop-table"></div>
          <div id="tasksCards" class="mobile-list"></div>
        </section>

        <section id="accountSettings">
          <h2>Ayarlar</h2>
          <div id="settingsBadges"></div>
          <h2 style="margin-top:14px">Son İşlem</h2>
          <pre id="actionResult">Henüz işlem yok.</pre>
        </section>
      </div>
    </main>

    <script>
      let latest = {};
      const riskRank = {critical: 4, high: 3, medium: 2, low: 1};
      const tr = {
        FAILED: 'Hatalı',
        RUNNING: 'Çalışıyor',
        ASSIGNED: 'Atandı',
        PENDING: 'Bekliyor',
        QUEUED: 'Kuyrukta',
        PROPOSAL_READY: 'Proposal hazır',
        PROPOSAL_DONE: 'Proposal tamam',
        READY_FOR_VALIDATION: 'Doğrulama bekliyor',
        VALIDATION_FAILED: 'Doğrulama kaldı',
        PIPELINE_FAILED: 'Pipeline kaldı',
        FAILED_TIMEOUT: 'Timeout',
        FAILED_RETRYABLE: 'Tekrar denenebilir',
        STALLED: 'İlerleme durdu',
        FINAL_REPORTED: 'Raporlandı',
        DONE: 'Tamamlandı',
        DEPLOYED: 'Canlıda',
        PASS: 'Geçti',
        FAIL: 'Kaldı',
        BLOCKED: 'Bloklandı',
        WAITING: 'Bekliyor',
        TRUE: 'Açık',
        FALSE: 'Kapalı'
      };
      const flowStageLabels = {
        intake: 'Alım',
        queue: 'Kuyruk',
        worker: 'Worker',
        proposal: 'Proposal',
        validation: 'Doğrulama',
        approval: 'Onay',
        failed: 'Hata',
        closed: 'Kapalı',
        deployed: 'Canlı'
      };
      const flowStateLabels = {
        empty: 'Boş',
        active: 'Aktif',
        blocked: 'Bloklu',
        failed: 'Hatalı',
        complete: 'Tamam'
      };
      let latestFlow = null;
      let pipelineFlowError = '';
      let pipelineFlowTimer = null;
      let pipelineFlowAbort = null;
      let pipelineFlowFailureCount = 0;
      let activeFlowStage = new URLSearchParams(location.search).get('pipeline_stage') || '';
      function esc(value){return String(value ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
      function badge(value){
        const s = String(value ?? '-');
        const u = s.toUpperCase();
        let cls = 'badge';
        if (['PASS','OK','DONE','TRUE','ACTIVE'].includes(u)) cls += ' ok';
        if (['PENDING','QUEUED','ASSIGNED','RUNNING','BLOCKED','WARN'].includes(u)) cls += ' warn';
        if (['FAIL','FAILED','ERROR','FALSE','INACTIVE','STALLED'].includes(u)) cls += ' bad';
        return `<span class="${cls}">${esc(tr[u] || s)}</span>`;
      }
      function taskTime(t){return Date.parse(t.updated_at || t.created_at || 0) || 0}
      function tasks(){ return ((latest.tasks || latest.queue || {}).tasks || []).slice(); }
      function workers(){ return ((latest.workers || {}).workers || []).slice(); }
      function accountDisplayName(data){
        return String(data?.auth?.username || 'Panel kullanıcısı');
      }
      function accountInitials(name){
        const cleaned = String(name || 'Panel').trim();
        const parts = cleaned.split(/\s+/).filter(Boolean);
        const initials = parts.length > 1 ? `${parts[0][0]}${parts[1][0]}` : cleaned.slice(0, 2);
        return (initials || 'P').toLocaleUpperCase('tr-TR');
      }
      function setAccountMenuOpen(open, focusMenu = false){
        accountMenuPanel.hidden = !open;
        accountMenuButton.setAttribute('aria-expanded', open ? 'true' : 'false');
        if (open && focusMenu) {
          const firstItem = accountMenuPanel.querySelector('[role="menuitem"]');
          if (firstItem) firstItem.focus();
        }
      }
      function toggleAccountMenu(){
        setAccountMenuOpen(accountMenuPanel.hidden, true);
      }
      function closeAccountMenu(refocus = false){
        if (accountMenuPanel.hidden) return;
        setAccountMenuOpen(false);
        if (refocus) accountMenuButton.focus();
      }
      function scrollToAccountSettings(){
        closeAccountMenu();
        accountSettings.scrollIntoView({behavior:'smooth', block:'start'});
      }
      function renderAccount(data){
        const name = accountDisplayName(data);
        const initials = accountInitials(name);
        const mode = data?.auth?.auth_mode === 'username_password' ? 'Panel hesabı' : 'Panel oturumu';
        accountName.textContent = name;
        accountAvatar.textContent = initials;
        accountPanelUsername.textContent = name;
        accountPanelAvatar.textContent = initials;
        accountPanelMode.textContent = mode;
      }
      function fillFilters(){
        const allTasks = tasks();
        const allWorkers = workers();
        const statuses = [...new Set(allTasks.map(t => t.status).filter(Boolean))].sort();
        const risks = [...new Set(allTasks.map(t => t.risk || t.risk_level).filter(Boolean))].sort();
        const workerIds = [...new Set(allWorkers.map(w => w.id).filter(Boolean))].sort();
        statusFilter.innerHTML = '<option value="">Tüm durumlar</option>' + statuses.map(x => `<option>${esc(x)}</option>`).join('');
        riskFilter.innerHTML = '<option value="">Tüm riskler</option>' + risks.map(x => `<option>${esc(x)}</option>`).join('');
        workerFilter.innerHTML = '<option value="">Tüm çalışanlar</option>' + workerIds.map(x => `<option>${esc(x)}</option>`).join('');
      }
      function filteredTasks(){
        let list = tasks();
        const q = search.value.toLowerCase();
        list = list.filter(t => {
          const text = `${t.id || ''} ${t.title || ''} ${t.description || ''}`.toLowerCase();
          return (!q || text.includes(q))
            && (!statusFilter.value || t.status === statusFilter.value)
            && (!workerFilter.value || t.assigned_worker === workerFilter.value)
            && (!riskFilter.value || (t.risk || t.risk_level) === riskFilter.value);
        });
        if (sortMode.value === 'oldest') list.sort((a,b) => taskTime(a)-taskTime(b));
        else if (sortMode.value === 'risk') list.sort((a,b) => (riskRank[b.risk || b.risk_level]||0)-(riskRank[a.risk || a.risk_level]||0));
        else if (sortMode.value === 'errors') list.sort((a,b) => (b.error_count||0)-(a.error_count||0));
        else list.sort((a,b) => taskTime(b)-taskTime(a));
        return list;
      }
      function renderTasks(){
        const list = filteredTasks();
        tasksTable.innerHTML = `<table><thead><tr><th>Görev</th><th>Durum</th><th>Çalışan</th><th>Risk</th></tr></thead><tbody>${
          list.map(t => `<tr><td><strong>${esc(t.title || t.id)}</strong><br><span class="muted">${esc(t.id)}</span></td><td>${badge(t.status)}</td><td>${esc(t.assigned_worker || '-')}</td><td>${esc(t.risk || t.risk_level || '-')}</td></tr>`).join('')
        }</tbody></table>`;
        tasksCards.innerHTML = list.map(t => `<div class="item"><strong>${esc(t.title || t.id)}</strong><br>${badge(t.status)} ${badge(t.risk || t.risk_level || '-')}<br><span class="muted">${esc(t.assigned_worker || 'Çalışan yok')}</span></div>`).join('');
      }
      function flowStages(){
        return latestFlow && Array.isArray(latestFlow.stages) ? latestFlow.stages : [];
      }
      function flowStateBadge(state){
        return badge(flowStateLabels[String(state || '').toLowerCase()] || state || '-');
      }
      function selectedFlowStage(){
        const stages = flowStages();
        if (!stages.length) return null;
        const existing = stages.find(stage => stage.id === activeFlowStage);
        if (existing) return existing;
        const current = stages.find(stage => stage.id === latestFlow?.summary?.current_stage);
        if (current) return current;
        return stages.find(stage => Number(stage.task_count || 0) > 0) || stages[0];
      }
      function setPipelineStage(stageId, updateUrl = true){
        activeFlowStage = stageId || '';
        if (updateUrl) {
          const url = new URL(location.href);
          if (activeFlowStage) url.searchParams.set('pipeline_stage', activeFlowStage);
          else url.searchParams.delete('pipeline_stage');
          history.replaceState(null, '', url);
        }
        renderPipelineFlow();
      }
      function renderPipelineFlow(){
        if (!latestFlow && !pipelineFlowError) {
          pipelineFlowTabs.innerHTML = '';
          pipelineFlowPanel.innerHTML = '<div class="muted">Pipeline flow yükleniyor.</div>';
          return;
        }
        const stages = flowStages();
        const selected = selectedFlowStage();
        if (selected && activeFlowStage !== selected.id) activeFlowStage = selected.id;
        const generatedAt = latestFlow?.generated_at ? new Date(latestFlow.generated_at).toLocaleTimeString() : '-';
        const stale = pipelineFlowError && latestFlow ? 'Son veri korunuyor' : '';
        pipelineFlowUpdated.textContent = pipelineFlowError ? `Hata: ${pipelineFlowError}` : `Güncellendi ${generatedAt}`;
        pipelineFlowMode.textContent = stale || (latestFlow?.non_mutating ? 'Salt okunur' : 'Kontrol ediliyor');
        pipelineFlowTabs.innerHTML = stages.map(stage => {
          const selectedAttr = selected && stage.id === selected.id ? 'true' : 'false';
          const label = flowStageLabels[stage.id] || stage.label || stage.id;
          return `<button type="button" class="tab-button" role="tab" id="flow-tab-${esc(stage.id)}" aria-controls="pipelineFlowPanel" aria-selected="${selectedAttr}" tabindex="${selectedAttr === 'true' ? '0' : '-1'}" data-stage="${esc(stage.id)}"><span>${esc(label)}</span><span class="tab-count">${esc(stage.task_count ?? 0)}</span></button>`;
        }).join('');
        pipelineFlowTabs.querySelectorAll('[data-stage]').forEach(button => {
          button.addEventListener('click', () => setPipelineStage(button.dataset.stage || ''));
        });
        if (!selected) {
          pipelineFlowPanel.innerHTML = `<div class="muted">${esc(pipelineFlowError || 'Stage verisi yok.')}</div>`;
          return;
        }
        const statusCounts = Object.entries(selected.status_counts || {});
        const summary = latestFlow?.summary || {};
        const markers = latestFlow?.markers || {};
        const pipelineMarker = markers.pipeline_status || {};
        const githubMarker = markers.github_actions || {};
        const smokeMarker = markers.last_smoke_test || {};
        const tasksHtml = (selected.tasks || []).map(task => {
          return `<div class="flow-task"><div><strong>${esc(task.id || '-')}</strong><br><span class="muted">${esc(task.assigned_worker || 'Çalışan yok')}</span></div><div>${badge(task.status)} ${badge(task.risk || task.risk_level || '-')}</div><div class="muted">${esc(task.updated_at || task.finished_at || task.created_at || '-')}</div></div>`;
        }).join('') || '<div class="muted">Bu stage içinde görev yok.</div>';
        pipelineFlowPanel.innerHTML = `
          <div class="flow-summary">
            <div><div class="muted">Seçili stage</div><div class="flow-value">${esc(flowStageLabels[selected.id] || selected.label || selected.id)}</div></div>
            <div><div class="muted">Stage durumu</div><div>${flowStateBadge(selected.state)}</div></div>
            <div><div class="muted">Toplam görev</div><div class="flow-value">${esc(summary.task_count ?? 0)}</div></div>
            <div><div class="muted">Blok / hata</div><div>${badge(summary.blocked_count ?? 0)} ${badge(summary.failed_count ?? 0)}</div></div>
          </div>
          <div class="flow-marker-row">
            ${badge(`Pipeline: ${pipelineMarker.task_to_deploy_test || pipelineMarker.status || '-'}`)}
            ${badge(`GitHub: ${githubMarker.last_deploy_status || githubMarker.status || '-'}`)}
            ${badge(`Smoke: ${smokeMarker.status || smokeMarker.ok || '-'}`)}
          </div>
          <div class="muted">Status dağılımı</div>
          <div class="flow-marker-row">${statusCounts.length ? statusCounts.map(([status, count]) => `${badge(status)}<span class="badge">${esc(count)}</span>`).join('') : badge('Boş')}</div>
          <div>${tasksHtml}</div>
        `;
      }
      function handlePipelineTabKey(event){
        const buttons = Array.from(pipelineFlowTabs.querySelectorAll('[role="tab"]'));
        if (!buttons.length) return;
        const currentIndex = Math.max(0, buttons.findIndex(button => button.getAttribute('aria-selected') === 'true'));
        let nextIndex = null;
        if (event.key === 'ArrowRight') nextIndex = (currentIndex + 1) % buttons.length;
        if (event.key === 'ArrowLeft') nextIndex = (currentIndex - 1 + buttons.length) % buttons.length;
        if (event.key === 'Home') nextIndex = 0;
        if (event.key === 'End') nextIndex = buttons.length - 1;
        if (nextIndex === null) return;
        event.preventDefault();
        buttons[nextIndex].focus();
        setPipelineStage(buttons[nextIndex].dataset.stage || '');
      }
      function pipelineFlowInterval(){
        if (document.hidden) return 15000;
        return Math.min(30000, 5000 * Math.max(1, pipelineFlowFailureCount));
      }
      function schedulePipelineFlowRefresh(){
        if (pipelineFlowTimer) clearTimeout(pipelineFlowTimer);
        pipelineFlowTimer = setTimeout(refreshPipelineFlow, pipelineFlowInterval());
      }
      async function refreshPipelineFlow(){
        if (pipelineFlowAbort) pipelineFlowAbort.abort();
        pipelineFlowAbort = new AbortController();
        try {
          const res = await fetch('/api/pipeline-flow', {cache:'no-store', signal:pipelineFlowAbort.signal});
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          latestFlow = await res.json();
          pipelineFlowError = '';
          pipelineFlowFailureCount = 0;
        } catch (err) {
          if (err.name === 'AbortError') return;
          pipelineFlowError = err.message || 'pipeline_flow_fetch_failed';
          pipelineFlowFailureCount += 1;
        } finally {
          renderPipelineFlow();
          schedulePipelineFlowRefresh();
        }
      }
      function render(data){
        latest = data;
        const controlled = data.controlled_execution || {};
        clock.textContent = new Date().toLocaleTimeString();
        renderAccount(data);
        const dashboardSettings = data.dashboard_settings?.dashboard || {};
        settingsBadges.innerHTML = Object.entries({
          'Panel modu': dashboardSettings.auth_mode || data.auth?.auth_mode || '-',
          'Dil': dashboardSettings.language || 'tr',
          'Kompakt mod': dashboardSettings.compact_mode,
          'Kontrollü öneri': controlled.status || '-',
          'Kontrollü görev': controlled.last_task || '-',
          'Kontrollü rapor': controlled.latest_report || '-',
          'Öneri repo değişikliği': controlled.proposal_mode_repo_mutation_allowed ? 'Açık' : 'Kapalı'
        }).map(([k,v]) => `${esc(k)}: ${badge(v)}`).join('<br>');
        fillFilters();
        renderTasks();
      }
      async function refresh(){
        const res = await fetch('/api/status', {cache:'no-store'});
        render(await res.json());
      }
      async function runAction(action){
        actionResult.textContent = 'Çalışıyor...';
        const res = await fetch('/api/action', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({action})});
        actionResult.textContent = JSON.stringify(await res.json(), null, 2);
        await refresh();
      }
      async function logout(){
        await fetch('/api/auth/logout', {method:'POST'});
        location.href = '/login';
      }
      document.addEventListener('click', event => {
        if (!accountMenu.contains(event.target)) closeAccountMenu();
      });
      accountMenuButton.addEventListener('keydown', event => {
        if (event.key === 'ArrowDown') {
          event.preventDefault();
          setAccountMenuOpen(true, true);
        }
      });
      accountMenuPanel.addEventListener('keydown', event => {
        const items = [...accountMenuPanel.querySelectorAll('[role="menuitem"]')];
        const index = items.indexOf(document.activeElement);
        if (event.key === 'Escape') {
          event.preventDefault();
          closeAccountMenu(true);
        } else if (event.key === 'ArrowDown') {
          event.preventDefault();
          items[(index + 1) % items.length]?.focus();
        } else if (event.key === 'ArrowUp') {
          event.preventDefault();
          items[(index - 1 + items.length) % items.length]?.focus();
        } else if (event.key === 'Home') {
          event.preventDefault();
          items[0]?.focus();
        } else if (event.key === 'End') {
          event.preventDefault();
          items[items.length - 1]?.focus();
        }
      });
      [search, statusFilter, workerFilter, riskFilter, sortMode].forEach(el => el.addEventListener('input', renderTasks));
      pipelineFlowTabs.addEventListener('keydown', handlePipelineTabKey);
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) schedulePipelineFlowRefresh();
        else refreshPipelineFlow();
      });
      refresh();
      refreshPipelineFlow();
      setInterval(refresh, 5000);
    </script>
  </body>
</html>
