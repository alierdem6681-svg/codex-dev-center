name: Bootstrap Panel User

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type BOOTSTRAP-PANEL-USER to verify open dashboard access"
        required: true
        type: string

concurrency:
  group: codex-dev-center-panel-bootstrap
  cancel-in-progress: false

jobs:
  bootstrap:
    name: Bootstrap panel user on codex-dev-center-01
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CONFIRM_PHRASE: BOOTSTRAP-PANEL-USER
      VM_TARGET: codex-dev-center-01
      RUNTIME_DIR: /opt/codex-dev-center
      DASHBOARD_URL: http://127.0.0.1:8080

    steps:
      - name: Confirm bootstrap
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ inputs.confirm }}" != "$CONFIRM_PHRASE" ]; then
            echo "Confirmation text is wrong. Bootstrap stopped."
            exit 1
          fi

      - name: Validate runner target
        shell: bash
        run: |
          set -euo pipefail
          host="$(hostname)"
          echo "Runner name: ${RUNNER_NAME:-unknown}"
          echo "Host: $host"
          if [ "${RUNNER_NAME:-}" != "$VM_TARGET" ] && [ "$host" != "$VM_TARGET" ]; then
            echo "This workflow must run on $VM_TARGET."
            exit 1
          fi

      - name: Verify auth disabled contract
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          print("panel_auth=disabled")
          print("panel_user_bootstrap=not_required")
          PY

      - name: Restart panel service
        shell: bash
        run: |
          set -euo pipefail
          sudo systemctl restart codex-panel
          systemctl is-active codex-panel

      - name: Wait for panel health
        shell: bash
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            if curl -fsS --max-time 5 "$DASHBOARD_URL/health" >/tmp/codex-panel-health.json; then
              cat /tmp/codex-panel-health.json
              exit 0
            fi
            sleep 1
          done
          echo "Panel health did not become ready in time."
          exit 1

      - name: Direct dashboard smoke check
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS --max-time 10 "$DASHBOARD_URL/" >/tmp/codex-panel-dashboard.html
          grep -q "Dashboard" /tmp/codex-panel-dashboard.html
          grep -q "Pipeline Flow" /tmp/codex-panel-dashboard.html
          curl -fsS --max-time 10 "$DASHBOARD_URL/api/status" >/tmp/codex-panel-status.json
          grep -q '"ok": true' /tmp/codex-panel-status.json
          echo "direct_dashboard_smoke=PASS"

      - name: Health check
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS --max-time 5 "$DASHBOARD_URL/health" >/tmp/codex-panel-health.json
          cat /tmp/codex-panel-health.json
