name: Bootstrap Panel User

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type BOOTSTRAP-PANEL-USER to verify retired panel auth compatibility"
        required: true
        type: string

concurrency:
  group: codex-dev-center-panel-bootstrap
  cancel-in-progress: false

jobs:
  bootstrap:
    name: Bootstrap panel user on codex-dev-center-01
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CONFIRM_PHRASE: BOOTSTRAP-PANEL-USER
      VM_TARGET: codex-dev-center-01
      RUNTIME_DIR: /opt/codex-dev-center
      DASHBOARD_URL: http://127.0.0.1:8080

    steps:
      - name: Confirm bootstrap
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ inputs.confirm }}" != "$CONFIRM_PHRASE" ]; then
            echo "Confirmation text is wrong. Bootstrap stopped."
            exit 1
          fi

      - name: Validate runner target
        shell: bash
        run: |
          set -euo pipefail
          host="$(hostname)"
          echo "Runner name: ${RUNNER_NAME:-unknown}"
          echo "Host: $host"
          if [ "${RUNNER_NAME:-}" != "$VM_TARGET" ] && [ "$host" != "$VM_TARGET" ]; then
            echo "This workflow must run on $VM_TARGET."
            exit 1
          fi

      - name: Confirm direct access mode
        shell: bash
        run: |
          set -euo pipefail
          echo "panel_auth=disabled"

      - name: Verify auth compatibility module
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNTIME_DIR"
          python3 - <<'PY'
          import sys
          from pathlib import Path

          sys.path.insert(0, str(Path("web_panel").resolve()))
          import auth  # noqa: E402

          state = auth.public_auth_state()
          if state.get("auth_mode") != "disabled" or not state.get("direct_access_enabled"):
              raise SystemExit("panel_auth_not_disabled")
          print("panel_auth_compatibility=PASS")
          PY

      - name: Restart panel service
        shell: bash
        run: |
          set -euo pipefail
          sudo systemctl restart codex-panel
          systemctl is-active codex-panel

      - name: Wait for panel health
        shell: bash
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            if curl -fsS --max-time 5 "$DASHBOARD_URL/health" >/tmp/codex-panel-health.json; then
              cat /tmp/codex-panel-health.json
              exit 0
            fi
            sleep 1
          done
          echo "Panel health did not become ready in time."
          exit 1

      - name: Direct dashboard smoke check
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          request = urllib.request.Request(
              os.environ["DASHBOARD_URL"] + "/api/status",
              method="GET",
          )
          with urllib.request.urlopen(request, timeout=10) as response:
              body = response.read().decode("utf-8", errors="replace")
              if response.status != 200:
                  raise SystemExit(f"status_api={response.status}")
              data = json.loads(body)
              if not data.get("ok"):
                  raise SystemExit("status_not_ok")
          print("direct_dashboard_smoke=PASS")
          PY

      - name: Health check
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS --max-time 5 "$DASHBOARD_URL/health" >/tmp/codex-panel-health.json
          cat /tmp/codex-panel-health.json
