name: Deploy to VM

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DEPLOY-CODEX-VM to confirm production deploy"
        required: true
        type: string
      ref:
        description: "Branch or tag to deploy; raw commit SHA values are rejected"
        required: true
        default: "main"
        type: string

concurrency:
  group: codex-dev-center-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy codex-dev-center-01
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CONFIRM_PHRASE: DEPLOY-CODEX-VM
      VM_TARGET: codex-dev-center-01
      RUNTIME_DIR: /opt/codex-dev-center
      BACKUP_DIR: /opt/codex-dev-center-backups
      DASHBOARD_URL: http://127.0.0.1:8080
      PUBLIC_DASHBOARD_URL: http://34.185.153.184:8080

    steps:
      - name: Confirm production deploy
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ inputs.confirm }}" != "$CONFIRM_PHRASE" ]; then
            echo "Confirmation text is wrong. Production deploy stopped."
            exit 1
          fi

      - name: Validate runner target
        shell: bash
        run: |
          set -euo pipefail
          host="$(hostname)"
          echo "Runner name: ${RUNNER_NAME:-unknown}"
          echo "Host: $host"
          if [ "${RUNNER_NAME:-}" != "$VM_TARGET" ] && [ "$host" != "$VM_TARGET" ]; then
            echo "This workflow must run on $VM_TARGET."
            exit 1
          fi

      - name: Resolve deploy ref
        id: deploy_ref
        shell: bash
        env:
          REQUESTED_REF: ${{ inputs.ref }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          requested="$(printf '%s' "${REQUESTED_REF:-main}" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          if [ -z "$requested" ]; then
            requested="main"
          fi

          if [[ "$requested" =~ ^[0-9a-fA-F]{7,40}$ ]]; then
            echo "Raw commit SHA deploy refs are not accepted for production deploy: $requested"
            echo "Use a branch or tag that keeps the target commit reachable, for example ref=main."
            exit 1
          fi

          repo_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          auth="$(printf 'x-access-token:%s' "$GITHUB_TOKEN" | base64 | tr -d '\n')"
          git_auth=(-c "http.${GITHUB_SERVER_URL}/.extraheader=AUTHORIZATION: basic $auth")
          remote_ref_file="${RUNNER_TEMP:-/tmp}/codex-deploy-ref.$$"

          if [[ "$requested" == refs/heads/* || "$requested" == refs/tags/* ]]; then
            if ! git "${git_auth[@]}" ls-remote --exit-code "$repo_url" "$requested" >"$remote_ref_file"; then
              echo "Requested deploy ref does not exist on GitHub remote: $requested"
              exit 1
            fi
            resolved="$requested"
          elif [[ "$requested" == refs/* ]]; then
            echo "Only branch and tag refs are accepted for production deploy: $requested"
            exit 1
          elif git "${git_auth[@]}" ls-remote --exit-code --heads "$repo_url" "$requested" >"$remote_ref_file"; then
            resolved="$requested"
          elif git "${git_auth[@]}" ls-remote --exit-code --tags "$repo_url" "$requested" >"$remote_ref_file"; then
            resolved="$requested"
          else
            echo "Requested deploy ref does not exist as a GitHub branch or tag: $requested"
            exit 1
          fi

          remote_sha="$(awk 'NR == 1 {print $1}' "$remote_ref_file")"
          echo "ref=$resolved" >> "$GITHUB_OUTPUT"
          echo "remote_sha=$remote_sha" >> "$GITHUB_OUTPUT"
          echo "deploy_ref=$resolved" >> "$GITHUB_STEP_SUMMARY"
          echo "deploy_ref_remote_sha=$remote_sha" >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout deploy ref
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.deploy_ref.outputs.ref }}
          fetch-depth: 1

      - name: Record checked out revision
        shell: bash
        run: |
          set -euo pipefail
          deployed_sha="$(git rev-parse HEAD)"
          echo "DEPLOY_REF=${{ steps.deploy_ref.outputs.ref }}" >> "$GITHUB_ENV"
          echo "DEPLOY_REF_SHA=$deployed_sha" >> "$GITHUB_ENV"
          echo "checked_out_sha=$deployed_sha" >> "$GITHUB_STEP_SUMMARY"

      - name: Preflight checks
        shell: bash
        run: |
          set -euo pipefail
          echo "===== TOOL CHECK ====="
          command -v python3
          command -v tar
          command -v rsync
          command -v curl
          command -v systemctl

          echo "===== TARGET DIRECTORY ====="
          test -d "$RUNTIME_DIR"
          sudo mkdir -p "$BACKUP_DIR"

          echo "===== YAML SANITY CHECK ====="
          python3 - <<'PY'
          from pathlib import Path
          errors = []
          for path in Path(".github/workflows").glob("*.yml"):
              text = path.read_text(encoding="utf-8", errors="replace")
              if "\t" in text:
                  errors.append(f"{path}: tab character")
              if "name:" not in text or "on:" not in text or "jobs:" not in text:
                  errors.append(f"{path}: missing required workflow keys")
          if errors:
              raise SystemExit("\n".join(errors))
          print("yaml_sanity_pass")
          PY

          echo "===== FORBIDDEN EXECUTABLE SCAN ====="
          python3 - <<'PY'
          import re
          from pathlib import Path
          patterns = [
              re.compile(r"\bgcloud\b.*\b(delete|set-iam-policy|add-iam-policy-binding|run deploy)\b", re.I),
              re.compile(r"\bterraform\s+apply\b", re.I),
              re.compile(r"\bkubectl\s+(apply|delete|patch)\b", re.I),
              re.compile(r"\b(drop table|truncate table|delete from)\b", re.I),
              re.compile(r"\bgoogle ads\b.*\bmutate\b", re.I),
          ]
          findings = []
          for root in [Path(".github/workflows"), Path("scripts")]:
              if not root.exists():
                  continue
              for path in root.rglob("*"):
                  if path.suffix.lower() not in {".yml", ".yaml", ".sh", ".py"}:
                      continue
                  text = path.read_text(encoding="utf-8", errors="replace")
                  for line_no, line in enumerate(text.splitlines(), 1):
                      if "re.compile(" in line or "patterns = [" in line:
                          continue
                      for pattern in patterns:
                          if pattern.search(line):
                              findings.append(f"{path}:{line_no}:{pattern.pattern}")
          if findings:
              raise SystemExit("\n".join(findings))
          print("forbidden_executable_scan_pass")
          PY

          echo "===== PYTHON COMPILE CHECK ====="
          python3 -m compileall -q supervisor web_panel scripts

          echo "===== JSON CHECK ====="
          python3 - <<'PY'
          import json
          from pathlib import Path
          for path in Path("state_templates").glob("*.json"):
              json.loads(path.read_text(encoding="utf-8-sig"))
          print("json_validation_pass")
          PY

          echo "===== PRODUCTION READINESS ====="
          python3 supervisor/production_readiness_suite.py --json

      - name: Create backup
        shell: bash
        run: |
          set -euo pipefail
          stamp="$(date -u +%Y%m%dT%H%M%SZ)"
          backup="$BACKUP_DIR/pre_deploy_$stamp.tar.gz"
          runtime_name="$(basename "$RUNTIME_DIR")"
          sudo tar \
            --exclude="$runtime_name/.git" \
            --exclude="$runtime_name/.github" \
            --exclude="$runtime_name/.venv" \
            --exclude="$runtime_name/venv" \
            --exclude="$runtime_name/node_modules" \
            --exclude="$runtime_name/state" \
            --exclude="$runtime_name/logs" \
            --exclude="$runtime_name/workspaces" \
            --exclude="$runtime_name/backups" \
            --exclude="$runtime_name/tmp" \
            --exclude="$runtime_name/secrets" \
            --exclude="$runtime_name/.env" \
            --exclude="$runtime_name/.env.*" \
            --exclude="$runtime_name/*.log" \
            --exclude="$runtime_name/*.ndjson" \
            --exclude="$runtime_name/*.pem" \
            --exclude="$runtime_name/*.key" \
            --exclude="$runtime_name/__pycache__" \
            -czf "$backup" \
            -C "$(dirname "$RUNTIME_DIR")" "$runtime_name"
          test -s "$backup"
          echo "backup=$backup" >> "$GITHUB_STEP_SUMMARY"
          echo "LAST_BACKUP_PATH=$backup" >> "$GITHUB_ENV"

      - name: Deploy repository files
        shell: bash
        run: |
          set -euo pipefail
          sudo rsync -a --delete \
            --exclude ".git/" \
            --exclude "actions-runner/" \
            --exclude "state/" \
            --exclude "logs/" \
            --exclude "workspaces/" \
            --exclude "backups/" \
            --exclude "tmp/" \
            --exclude "*.log" \
            --exclude ".env" \
            --exclude ".env.*" \
            --exclude "secrets/" \
            --exclude "*.pem" \
            --exclude "*.key" \
            --exclude "venv/" \
            --exclude ".venv/" \
            --exclude "node_modules/" \
            --exclude "__pycache__/" \
            ./ "$RUNTIME_DIR"/
          sudo chown -R alierdem6681:alierdem6681 "$RUNTIME_DIR"

      - name: Validate runtime files
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNTIME_DIR"
          python3 -m compileall -q supervisor web_panel scripts
          find state_templates -name "*.json" -print0 | xargs -0 -r -I{} python3 -m json.tool "{}" >/dev/null
          python3 supervisor/policy_sync.py --json

      - name: Restart services
        shell: bash
        run: |
          set -euo pipefail
          required_services=(codex-panel codex-direct-cto codex-lifecycle codex-watchdog)
          for svc in "${required_services[@]}"; do
            if systemctl list-unit-files "$svc.service" >/dev/null 2>&1; then
              sudo systemctl restart "$svc"
              echo "$svc restarted"
            else
              echo "$svc.service not installed; skipped"
            fi
          done
          worker_services=(codex-worker-1 codex-worker-2 codex-worker-3 codex-worker-4)
          for svc in "${worker_services[@]}"; do
            if systemctl list-unit-files "$svc.service" >/dev/null 2>&1; then
              sudo systemctl reset-failed "$svc" || true
              if sudo systemctl restart "$svc"; then
                echo "$svc restarted"
              else
                echo "$svc restart skipped or canceled; lifecycle will reconcile worker state"
              fi
            else
              echo "$svc.service not installed; skipped"
            fi
          done

      - name: Smoke check
        shell: bash
        run: |
          set -euo pipefail
          sleep 3

          echo "===== REQUIRED SERVICES ====="
          systemctl is-active codex-panel
          if systemctl list-unit-files codex-direct-cto.service >/dev/null 2>&1; then
            systemctl is-active codex-direct-cto
          fi
          if systemctl list-unit-files codex-lifecycle.service >/dev/null 2>&1; then
            systemctl is-active codex-lifecycle
          fi
          if systemctl list-unit-files codex-watchdog.service >/dev/null 2>&1; then
            systemctl is-active codex-watchdog
          fi

          echo "===== WORKER SERVICES ====="
          for svc in codex-worker-1 codex-worker-2 codex-worker-3 codex-worker-4; do
            if systemctl list-unit-files "$svc.service" >/dev/null 2>&1; then
              systemctl is-active "$svc" || true
            else
              echo "$svc.service not installed"
            fi
          done

          echo "===== WORKER LIFECYCLE ====="
          cd "$RUNTIME_DIR"
          python3 scripts/worker_lifecycle_check.py --runtime "$RUNTIME_DIR" --repair --json

          echo "===== DASHBOARD HEALTH ====="
          for i in $(seq 1 20); do
            if curl -fsS --max-time 5 "$DASHBOARD_URL/health" >/tmp/codex-health.json; then
              cat /tmp/codex-health.json
              break
            fi
            sleep 2
          done
          test -s /tmp/codex-health.json

          echo "===== LOGIN PAGE ====="
          curl -fsS --max-time 10 "$DASHBOARD_URL/login" >/tmp/codex-login.html
          grep -q "Kullanıcı adı" /tmp/codex-login.html
          grep -q "Şifre" /tmp/codex-login.html

          echo "===== API AUTH BEHAVIOR ====="
          unauth_code="$(curl -sS -o /tmp/codex-status-unauth.json -w "%{http_code}" --max-time 10 "$DASHBOARD_URL/api/status")"
          test "$unauth_code" = "401"
          auth_header="$(cd "$RUNTIME_DIR" && python3 - <<'PY'
          import sys
          from pathlib import Path
          sys.path.insert(0, str(Path("web_panel").resolve()))
          import auth  # noqa: E402
          print("Cookie: " + auth.automation_cookie_header())
          PY
          )"
          curl -fsS --max-time 10 -H "$auth_header" "$DASHBOARD_URL/api/status" >/tmp/codex-status-auth.json
          grep -q '"ok": true' /tmp/codex-status-auth.json

          echo "===== PUBLIC DASHBOARD ====="
          curl -fsS --max-time 10 "$PUBLIC_DASHBOARD_URL/health" >/tmp/codex-public-health.json
          grep -q '"ok": true' /tmp/codex-public-health.json
          curl -fsS --max-time 10 "$PUBLIC_DASHBOARD_URL/login" >/tmp/codex-public-login.html
          grep -q "Kullanıcı adı" /tmp/codex-public-login.html
          grep -q "Şifre" /tmp/codex-public-login.html
          echo "smoke=PASS" >> "$GITHUB_STEP_SUMMARY"

      - name: Deployment summary
        shell: bash
        run: |
          mkdir -p "$RUNTIME_DIR/state"
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          state = Path(os.environ["RUNTIME_DIR"]) / "state"
          state.mkdir(parents=True, exist_ok=True)
          now = datetime.now(timezone.utc).replace(microsecond=0).isoformat()

          github_actions = {
              "updated_at": now,
              "runner_name": os.environ.get("RUNNER_NAME", ""),
              "vm_target": os.environ.get("VM_TARGET", ""),
              "workflow": os.environ.get("GITHUB_WORKFLOW", ""),
              "last_deploy_status": "PASS",
              "last_deploy_run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "last_deploy_run_url": f"https://github.com/{os.environ.get('GITHUB_REPOSITORY', '')}/actions/runs/{os.environ.get('GITHUB_RUN_ID', '')}",
              "last_deploy_commit": os.environ.get("DEPLOY_REF_SHA") or os.environ.get("GITHUB_SHA", ""),
              "last_deploy_ref": os.environ.get("DEPLOY_REF") or os.environ.get("GITHUB_REF_NAME", ""),
              "last_deploy_at": now,
              "last_smoke_status": "PASS",
              "last_backup_path": os.environ.get("LAST_BACKUP_PATH", ""),
              "public_health_url": os.environ.get("PUBLIC_DASHBOARD_URL", "") + "/health",
          }
          pipeline_status = {
              "updated_at": now,
              "task_to_deploy_test": "PASS",
              "source": "github_actions_deploy_workflow",
              "workflow_run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "commit": os.environ.get("DEPLOY_REF_SHA") or os.environ.get("GITHUB_SHA", ""),
              "runner": os.environ.get("RUNNER_NAME", ""),
          }
          production_deploy = {
              "updated_at": now,
              "status": "PASS",
              "source": "github_actions_deploy_workflow",
              "workflow_run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "workflow_run_url": github_actions["last_deploy_run_url"],
              "commit": os.environ.get("DEPLOY_REF_SHA") or os.environ.get("GITHUB_SHA", ""),
              "ref": os.environ.get("DEPLOY_REF") or os.environ.get("GITHUB_REF_NAME", ""),
              "backup_path": os.environ.get("LAST_BACKUP_PATH", ""),
              "staging_deploy_performed": True,
              "production_deploy_performed": True,
              "post_deploy_smoke_status": "PASS",
              "blockers": [],
          }
          production_runtime = {
              "updated_at": now,
              "status": "PASS",
              "source": "github_actions_deploy_workflow",
              "workflow_run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "commit": os.environ.get("DEPLOY_REF_SHA") or os.environ.get("GITHUB_SHA", ""),
              "runtime_dir": os.environ.get("RUNTIME_DIR", ""),
              "dashboard_url": os.environ.get("DASHBOARD_URL", ""),
              "public_dashboard_url": os.environ.get("PUBLIC_DASHBOARD_URL", ""),
              "blockers": [],
          }
          for name, payload in {
              "github_actions_status.json": github_actions,
              "pipeline_status.json": pipeline_status,
              "production_deploy_status.json": production_deploy,
              "production_runtime_status.json": production_runtime,
          }.items():
              tmp = state / f"{name}.{os.getpid()}.tmp"
              tmp.write_text(json.dumps(payload, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
              tmp.replace(state / name)
          PY
          {
            echo "deployment=PASS"
            echo "target=$VM_TARGET"
            echo "runtime=$RUNTIME_DIR"
            echo "ref=$DEPLOY_REF"
            echo "commit=$DEPLOY_REF_SHA"
            echo "completed_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_STEP_SUMMARY"
