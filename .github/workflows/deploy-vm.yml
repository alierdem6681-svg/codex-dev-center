name: Deploy to VM

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DEPLOY-CODEX-VM to deploy"
        required: true
        type: string
      ref:
        description: "Branch or commit to deploy"
        required: true
        default: "main"
        type: string

concurrency:
  group: codex-dev-center-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy codex-dev-center-01
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CONFIRM_PHRASE: DEPLOY-CODEX-VM
      VM_TARGET: codex-dev-center-01
      RUNTIME_DIR: /opt/codex-dev-center
      BACKUP_DIR: /opt/codex-dev-center-backups
      DASHBOARD_URL: http://127.0.0.1:8080
      PUBLIC_DASHBOARD_URL: http://34.185.153.184:8080

    steps:
      - name: Confirm manual deploy
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ inputs.confirm }}" != "$CONFIRM_PHRASE" ]; then
            echo "Confirmation text is wrong. Deployment stopped."
            exit 1
          fi

      - name: Validate runner target
        shell: bash
        run: |
          set -euo pipefail
          host="$(hostname)"
          echo "Runner name: ${RUNNER_NAME:-unknown}"
          echo "Host: $host"
          if [ "${RUNNER_NAME:-}" != "$VM_TARGET" ] && [ "$host" != "$VM_TARGET" ]; then
            echo "This workflow must run on $VM_TARGET."
            exit 1
          fi

      - name: Checkout requested ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 1

      - name: Preflight checks
        shell: bash
        run: |
          set -euo pipefail
          echo "===== TOOL CHECK ====="
          command -v python3
          command -v tar
          command -v rsync
          command -v curl
          command -v systemctl

          echo "===== TARGET DIRECTORY ====="
          test -d "$RUNTIME_DIR"
          sudo mkdir -p "$BACKUP_DIR"

          echo "===== YAML SANITY CHECK ====="
          python3 - <<'PY'
          from pathlib import Path
          errors = []
          for path in Path(".github/workflows").glob("*.yml"):
              text = path.read_text(encoding="utf-8", errors="replace")
              if "\t" in text:
                  errors.append(f"{path}: tab character")
              if "name:" not in text or "on:" not in text or "jobs:" not in text:
                  errors.append(f"{path}: missing required workflow keys")
          if errors:
              raise SystemExit("\n".join(errors))
          print("yaml_sanity_pass")
          PY

          echo "===== FORBIDDEN EXECUTABLE SCAN ====="
          python3 - <<'PY'
          import re
          from pathlib import Path
          patterns = [
              re.compile(r"\bgcloud\b.*\b(delete|set-iam-policy|add-iam-policy-binding|run deploy)\b", re.I),
              re.compile(r"\bterraform\s+apply\b", re.I),
              re.compile(r"\bkubectl\s+(apply|delete|patch)\b", re.I),
              re.compile(r"\b(drop table|truncate table|delete from)\b", re.I),
              re.compile(r"\bgoogle ads\b.*\bmutate\b", re.I),
          ]
          findings = []
          for root in [Path(".github/workflows"), Path("scripts")]:
              if not root.exists():
                  continue
              for path in root.rglob("*"):
                  if path.suffix.lower() not in {".yml", ".yaml", ".sh", ".py"}:
                      continue
                  text = path.read_text(encoding="utf-8", errors="replace")
                  for line_no, line in enumerate(text.splitlines(), 1):
                      if "re.compile(" in line or "patterns = [" in line:
                          continue
                      for pattern in patterns:
                          if pattern.search(line):
                              findings.append(f"{path}:{line_no}:{pattern.pattern}")
          if findings:
              raise SystemExit("\n".join(findings))
          print("forbidden_executable_scan_pass")
          PY

          echo "===== PYTHON COMPILE CHECK ====="
          python3 -m compileall -q supervisor web_panel scripts

          echo "===== JSON CHECK ====="
          python3 - <<'PY'
          import json
          from pathlib import Path
          for path in Path("state_templates").glob("*.json"):
              json.loads(path.read_text(encoding="utf-8-sig"))
          print("json_validation_pass")
          PY

          echo "===== PRODUCTION READINESS ====="
          python3 supervisor/production_readiness_suite.py --json

      - name: Create backup
        shell: bash
        run: |
          set -euo pipefail
          stamp="$(date -u +%Y%m%dT%H%M%SZ)"
          backup="$BACKUP_DIR/pre_deploy_$stamp.tar.gz"
          sudo tar \
            --exclude="$RUNTIME_DIR/.git" \
            --exclude="$RUNTIME_DIR/.github" \
            --exclude="$RUNTIME_DIR/.venv" \
            --exclude="$RUNTIME_DIR/venv" \
            --exclude="$RUNTIME_DIR/node_modules" \
            --exclude="$RUNTIME_DIR/__pycache__" \
            -czf "$backup" \
            -C "$(dirname "$RUNTIME_DIR")" "$(basename "$RUNTIME_DIR")"
          test -s "$backup"
          echo "backup=$backup" >> "$GITHUB_STEP_SUMMARY"
          echo "LAST_BACKUP_PATH=$backup" >> "$GITHUB_ENV"

      - name: Deploy repository files
        shell: bash
        run: |
          set -euo pipefail
          sudo rsync -a --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "actions-runner/" \
            --exclude "state/" \
            --exclude "logs/" \
            --exclude "workspaces/" \
            --exclude "backups/" \
            --exclude "tmp/" \
            --exclude "*.log" \
            --exclude ".env" \
            --exclude ".env.*" \
            --exclude "secrets/" \
            --exclude "*.pem" \
            --exclude "*.key" \
            --exclude "venv/" \
            --exclude ".venv/" \
            --exclude "node_modules/" \
            --exclude "__pycache__/" \
            ./ "$RUNTIME_DIR"/
          sudo chown -R alierdem6681:alierdem6681 "$RUNTIME_DIR"

      - name: Validate runtime files
        shell: bash
        run: |
          set -euo pipefail
          cd "$RUNTIME_DIR"
          python3 -m compileall -q supervisor web_panel scripts
          find state_templates -name "*.json" -print0 | xargs -0 -r -I{} python3 -m json.tool "{}" >/dev/null

      - name: Restart services
        shell: bash
        run: |
          set -euo pipefail
          services=(codex-panel codex-lifecycle codex-watchdog codex-worker-1 codex-worker-2 codex-worker-3 codex-worker-4)
          for svc in "${services[@]}"; do
            if systemctl list-unit-files "$svc.service" >/dev/null 2>&1; then
              sudo systemctl restart "$svc"
              echo "$svc restarted"
            else
              echo "$svc.service not installed; skipped"
            fi
          done

      - name: Smoke check
        shell: bash
        run: |
          set -euo pipefail
          sleep 3

          echo "===== REQUIRED SERVICES ====="
          systemctl is-active codex-panel
          if systemctl list-unit-files codex-lifecycle.service >/dev/null 2>&1; then
            systemctl is-active codex-lifecycle
          fi
          if systemctl list-unit-files codex-watchdog.service >/dev/null 2>&1; then
            systemctl is-active codex-watchdog
          fi

          echo "===== WORKER SERVICES ====="
          for svc in codex-worker-1 codex-worker-2 codex-worker-3 codex-worker-4; do
            if systemctl list-unit-files "$svc.service" >/dev/null 2>&1; then
              systemctl is-active "$svc" || true
            else
              echo "$svc.service not installed"
            fi
          done

          echo "===== WORKER LIFECYCLE ====="
          cd "$RUNTIME_DIR"
          python3 scripts/worker_lifecycle_check.py --runtime "$RUNTIME_DIR" --repair --json

          echo "===== DASHBOARD HEALTH ====="
          for i in $(seq 1 20); do
            if curl -fsS --max-time 5 "$DASHBOARD_URL/health" >/tmp/codex-health.json; then
              cat /tmp/codex-health.json
              break
            fi
            sleep 2
          done
          test -s /tmp/codex-health.json

          echo "===== LOGIN PAGE ====="
          curl -fsS --max-time 10 "$DASHBOARD_URL/login" >/tmp/codex-login.html
          grep -q "Kullanıcı adı" /tmp/codex-login.html
          grep -q "Şifre" /tmp/codex-login.html

          echo "===== API AUTH BEHAVIOR ====="
          unauth_code="$(curl -sS -o /tmp/codex-status-unauth.json -w "%{http_code}" --max-time 10 "$DASHBOARD_URL/api/status")"
          test "$unauth_code" = "401"
          auth_header="$(cd "$RUNTIME_DIR" && python3 - <<'PY'
          import sys
          from pathlib import Path
          sys.path.insert(0, str(Path("web_panel").resolve()))
          import auth  # noqa: E402
          print("Cookie: " + auth.automation_cookie_header())
          PY
          )"
          curl -fsS --max-time 10 -H "$auth_header" "$DASHBOARD_URL/api/status" >/tmp/codex-status-auth.json
          grep -q '"ok": true' /tmp/codex-status-auth.json

          echo "===== PUBLIC DASHBOARD ====="
          curl -fsS --max-time 10 "$PUBLIC_DASHBOARD_URL/health" >/tmp/codex-public-health.json
          grep -q '"ok": true' /tmp/codex-public-health.json
          curl -fsS --max-time 10 "$PUBLIC_DASHBOARD_URL/login" >/tmp/codex-public-login.html
          grep -q "Kullanıcı adı" /tmp/codex-public-login.html
          grep -q "Şifre" /tmp/codex-public-login.html
          echo "smoke=PASS" >> "$GITHUB_STEP_SUMMARY"

      - name: Deployment summary
        shell: bash
        run: |
          mkdir -p "$RUNTIME_DIR/state"
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          state = Path(os.environ["RUNTIME_DIR"]) / "state"
          state.mkdir(parents=True, exist_ok=True)
          now = datetime.now(timezone.utc).replace(microsecond=0).isoformat()

          github_actions = {
              "updated_at": now,
              "runner_name": os.environ.get("RUNNER_NAME", ""),
              "vm_target": os.environ.get("VM_TARGET", ""),
              "workflow": os.environ.get("GITHUB_WORKFLOW", ""),
              "last_deploy_status": "PASS",
              "last_deploy_run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "last_deploy_run_url": f"https://github.com/{os.environ.get('GITHUB_REPOSITORY', '')}/actions/runs/{os.environ.get('GITHUB_RUN_ID', '')}",
              "last_deploy_commit": os.environ.get("GITHUB_SHA", ""),
              "last_deploy_ref": os.environ.get("GITHUB_REF_NAME", ""),
              "last_deploy_at": now,
              "last_smoke_status": "PASS",
              "last_backup_path": os.environ.get("LAST_BACKUP_PATH", ""),
              "public_health_url": os.environ.get("PUBLIC_DASHBOARD_URL", "") + "/health",
          }
          pipeline_status = {
              "updated_at": now,
              "task_to_deploy_test": "PASS",
              "source": "github_actions_deploy_workflow",
              "workflow_run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "commit": os.environ.get("GITHUB_SHA", ""),
              "runner": os.environ.get("RUNNER_NAME", ""),
          }
          for name, payload in {
              "github_actions_status.json": github_actions,
              "pipeline_status.json": pipeline_status,
          }.items():
              tmp = state / f"{name}.{os.getpid()}.tmp"
              tmp.write_text(json.dumps(payload, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
              tmp.replace(state / name)
          PY
          {
            echo "deployment=PASS"
            echo "target=$VM_TARGET"
            echo "runtime=$RUNTIME_DIR"
            echo "ref=${{ inputs.ref }}"
            echo "completed_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_STEP_SUMMARY"
